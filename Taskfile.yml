version: '3'
dotenv: ['../.env','.env']
vars:
  MODULE_NAME: "Logging App"
  EXE_NAME: "smlogger"

includes:
  version: ../Taskfile.version.yml
  production: ../Taskfile.prod.yml

tasks:
  default:
    desc: "Development build of {{.MODULE_NAME}}"

    cmds:
      - echo "Running..."
      - go vet ./...
      - task: format
      - wails dev -ldflags "-X main.version=Dev" -tags webkit2_41

  update:
    cmds:
      - go get -u
      - go mod tidy
      - go mod verify
      - task: frontend

  frontend:
    dir: frontend
    cmds:
      - npm update

  format:
    dir: frontend
    cmds:
      - npm run format
      - npm run lint

  prod:
    cmds:
#      - task: production:prod
      - task: deploy
      - task: snap

  deploy:
    desc: "Local deployment of the {{.MODULE_NAME}} module"
    cmds:
      - wails build -tags webkit2_41 -ldflags "-X main.version=$(cat {{.VERSION_FILE}} 2>/dev/null || echo '0.0.0')" -o {{.EXE_NAME}}
      - sudo cp -f {{.SM_WORKING_DIR}}/bin/{{.EXE_NAME}} {{.SNAP_DIR}}/{{.EXE_NAME}}
#      - echo "✓ {{.MODULE_NAME}} v$(cat {{.VERSION_FILE}} 2>/dev/null || echo '0.0.0') deployed"

  snap:
    dir: snap
    desc: "Snap deployment of the {{.MODULE_NAME}} module"
    cmds:
      - |
        VERSION=$(cat ../.version 2>/dev/null || echo "0.0.0")
        sed -i "s|^version:.*|version: '$VERSION'|" snapcraft.yaml
        snapcraft pack --use-lxd
